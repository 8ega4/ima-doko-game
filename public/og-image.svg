<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">いま、どこ？ — 消えたボール</title>
  <desc id="description">見える、消える、頭の中で追い続ける15秒のワンタップゲーム</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07182b" />
      <stop offset=".58" stop-color="#020713" />
      <stop offset="1" stop-color="#06111f" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#25d9ff" stroke-opacity=".055" stroke-width="1" />
    </pattern>
    <filter id="cyan-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="coral-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="yellow-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <path d="M0 7H1200M0 623H1200" stroke="#25d9ff" stroke-width="7" />
  <path d="M68 84H246M68 84V130M1132 546H954M1132 546V500" fill="none" stroke="#25d9ff" stroke-width="5" />

  <g transform="translate(72 134)">
    <text x="14" y="0" fill="#25d9ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="25" font-weight="700" letter-spacing="5">15 SEC. / 3 ROUND / 1 TAP</text>
    <text x="0" y="112" fill="#f7f3ea" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif" font-size="92" font-weight="900" letter-spacing="-4">いま、どこ？</text>
    <text x="3" y="171" fill="#f4f700" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif" font-size="35" font-weight="800" letter-spacing="2">消えたボールの位置を当てろ</text>
    <path d="M0 209H490" stroke="#25d9ff" stroke-opacity=".42" stroke-width="2" />
    <text x="0" y="255" fill="#91a7b8" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif" font-size="27" font-weight="600">見える。消える。頭の中で追い続ける。</text>
    <g transform="translate(0 301)">
      <rect width="273" height="66" fill="#f4f700" />
      <text x="137" y="44" text-anchor="middle" fill="#020713" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif" font-size="25" font-weight="900" letter-spacing="2">同じ軌道で勝負</text>
    </g>
  </g>

  <g transform="translate(688 76)">
    <rect x="0" y="0" width="448" height="448" fill="#031426" stroke="#25d9ff" stroke-width="5" />
    <g stroke="#25d9ff" stroke-opacity=".11" stroke-width="1">
      <path d="M56 0V448M112 0V448M168 0V448M224 0V448M280 0V448M336 0V448M392 0V448" />
      <path d="M0 56H448M0 112H448M0 168H448M0 224H448M0 280H448M0 336H448M0 392H448" />
    </g>
    <g fill="none" stroke="#25d9ff">
      <circle cx="224" cy="224" r="111" stroke-opacity=".16" stroke-width="2" stroke-dasharray="5 10" />
      <circle cx="224" cy="224" r="185" stroke-opacity=".12" stroke-width="2" stroke-dasharray="5 12" />
      <path d="M0 31h24M31 0v24M417 0v24M424 31h24M0 417h24M31 424v24M417 448v-24M424 417h24" stroke-width="6" filter="url(#cyan-glow)" />
    </g>

    <path d="M68 354C106 211 196 123 306 140C371 150 403 190 398 243C393 297 347 325 294 294C258 273 246 236 270 193"
      fill="none" stroke="#ff654f" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="32 22" filter="url(#coral-glow)" />
    <circle cx="68" cy="354" r="14" fill="#ff654f" />
    <g filter="url(#yellow-glow)">
      <circle cx="270" cy="193" r="20" fill="#f4f700" />
      <circle cx="270" cy="193" r="35" fill="none" stroke="#f4f700" stroke-width="5" stroke-dasharray="11 8" />
    </g>
    <path d="M270 139v19M270 228v19M216 193h19M305 193h19" stroke="#f4f700" stroke-width="5" />
    <text x="224" y="416" text-anchor="middle" fill="#91a7b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" letter-spacing="4">TRACK THE INVISIBLE</text>
  </g>
</svg>
